<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento - Nexa Gaming</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0f1a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:#1f2937;
    padding:30px;
    border-radius:10px;
    width:400px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

select,input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>Finalizar Compra</h1>

<label>Forma de Pagamento</label>

<select id="pagamento">
    <option>Cartão de Crédito</option>
    <option>Cartão de Débito</option>
    <option>PIX</option>
    <option>Boleto</option>
</select>

<input type="text" placeholder="Nome do Cliente">

<input type="text" placeholder="Número do Cartão">

<input type="text" placeholder="Validade">

<input type="text" placeholder="CVV">

<button onclick="finalizar()">
Finalizar Compra
</button>

</div>

<script>
function finalizar(){
    alert("Compra realizada com sucesso!");
}
</script>

</body>
</html>
